<svg width="240" height="240" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Project Temple Guard">
  <defs>
    <linearGradient id="tgShield" x1="0" y1="0" x2="0" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#16233f"/>
      <stop offset="1" stop-color="#0a1120"/>
    </linearGradient>
    <linearGradient id="tgMask" x1="0" y1="40" x2="0" y2="210" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f6e7c1"/>
      <stop offset="0.55" stop-color="#d9c290"/>
      <stop offset="1" stop-color="#a3884f"/>
    </linearGradient>
    <linearGradient id="tgBlade" x1="0" y1="0" x2="0" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fff7cc"/>
      <stop offset="0.5" stop-color="#ffd60a"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <radialGradient id="tgCore" cx="0.5" cy="0.5" r="0.5">
      <stop stop-color="#fffbe6"/>
      <stop offset="1" stop-color="#ffd60a"/>
    </radialGradient>
    <filter id="tgGlow" x="-60%" y="-30%" width="220%" height="160%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Shield -->
  <path d="M120 8 L210 40 V120 C210 178 172 214 120 232 C68 214 30 178 30 120 V40 Z"
        fill="url(#tgShield)" stroke="#38bdf8" stroke-opacity="0.55" stroke-width="3"/>
  <path d="M120 8 L210 40 V120 C210 178 172 214 120 232 C68 214 30 178 30 120 V40 Z"
        fill="none" stroke="#0ea5e9" stroke-opacity="0.12" stroke-width="9"/>

  <!-- Saberstaff: glowing yellow blades top & bottom, hilt at center -->
  <g filter="url(#tgGlow)">
    <rect x="116" y="22" width="8" height="64" rx="4" fill="url(#tgBlade)"/>
    <rect x="116" y="170" width="8" height="48" rx="4" fill="url(#tgBlade)"/>
  </g>
  <!-- Hilt -->
  <rect x="113" y="92" width="14" height="58" rx="3" fill="#1f2937" stroke="#475569" stroke-width="1.5"/>
  <rect x="111" y="100" width="18" height="5" rx="2" fill="#64748b"/>
  <rect x="111" y="138" width="18" height="5" rx="2" fill="#64748b"/>

  <!-- Temple Guard mask -->
  <g>
    <!-- helmet crest / hood -->
    <path d="M120 44 C150 44 166 66 166 104 C166 150 146 184 120 198 C94 184 74 150 74 104 C74 66 90 44 120 44 Z"
          fill="url(#tgMask)" stroke="#7a652f" stroke-width="2"/>
    <!-- center ridge -->
    <path d="M120 48 L120 150" stroke="#8a7338" stroke-width="2.5" stroke-opacity="0.6"/>
    <!-- brow ridges -->
    <path d="M92 96 C104 88 116 88 120 94 C124 88 136 88 148 96"
          fill="none" stroke="#7a652f" stroke-width="3" stroke-linecap="round"/>
    <!-- eye slits -->
    <path d="M96 104 L114 110 L114 116 L96 110 Z" fill="#1a1205"/>
    <path d="M144 104 L126 110 L126 116 L144 110 Z" fill="#1a1205"/>
    <!-- nose / lower face panel -->
    <path d="M120 120 L131 156 C131 170 109 170 109 156 Z" fill="#caa75f" stroke="#7a652f" stroke-width="1.5"/>
  </g>

  <!-- saber core highlight passing in front of chin -->
  <circle cx="120" cy="186" r="5" fill="url(#tgCore)" filter="url(#tgGlow)"/>
</svg>
